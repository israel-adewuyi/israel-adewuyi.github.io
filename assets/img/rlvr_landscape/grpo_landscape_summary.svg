<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">GRPO reward landscape summary</title>
  <desc id="desc">A three-part diagram showing GRPO checkpoints, local two-dimensional perturbation slices, and the finding that high-reward policies become concentrated inside the low-KL neighborhood of the current policy.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#243447"/>
    </marker>
    <linearGradient id="reward" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4d35e"/>
      <stop offset="1" stop-color="#0ead69"/>
    </linearGradient>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #d7dde8; stroke-width: 1.5; rx: 8; }
      .title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #16202c; }
      .subtitle { font: 500 15px Inter, Segoe UI, Arial, sans-serif; fill: #536273; }
      .label { font: 600 17px Inter, Segoe UI, Arial, sans-serif; fill: #243447; }
      .small { font: 500 13px Inter, Segoe UI, Arial, sans-serif; fill: #5d6b7b; }
      .tiny { font: 500 11px Inter, Segoe UI, Arial, sans-serif; fill: #6d7a88; }
      .formula { font: 600 14px Inter, Segoe UI, Arial, sans-serif; fill: #243447; }
      .muted { stroke: #cfd6e1; stroke-width: 1.3; fill: none; }
      .arrow { stroke: #243447; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .axis { stroke: #738093; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .kl { fill: none; stroke: #3a86ff; stroke-width: 1.8; opacity: 0.82; }
      .grid { stroke: #e5e9f1; stroke-width: 1; }
      .high { fill: #0ead69; stroke: #ffffff; stroke-width: 1; }
      .mid { fill: #f4d35e; stroke: #ffffff; stroke-width: 1; }
      .low { fill: #ef476f; stroke: #ffffff; stroke-width: 1; }
      .checkpoint { fill: #4137ff; stroke: #ffffff; stroke-width: 2; }
      .callout { fill: #eef6ff; stroke: #b8d7ff; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="560"/>
  <text class="title" x="60" y="52">GRPO turns the local policy neighborhood into the object of study</text>
  <text class="subtitle" x="60" y="78">Train checkpoints, perturb them in a 2D parameter slice, then ask where reward survives as KL from the checkpoint grows.</text>

  <rect class="panel" x="60" y="112" width="292" height="330"/>
  <rect class="panel" x="454" y="112" width="292" height="330"/>
  <rect class="panel" x="848" y="112" width="292" height="330"/>

  <path class="arrow" d="M 374 276 C 398 276 412 276 435 276"/>
  <path class="arrow" d="M 768 276 C 792 276 806 276 829 276"/>

  <text class="label" x="86" y="150">1. Train with GRPO</text>
  <text class="small" x="86" y="174">Qwen2.5-0.5B on Alphabet-sort</text>
  <g transform="translate(92 205)">
    <rect x="0" y="0" width="196" height="64" rx="8" fill="#eef0ff" stroke="#c7c9ff"/>
    <text class="formula" x="18" y="27">J_GRPO(theta)</text>
    <text class="tiny" x="18" y="48">clipped token surrogate</text>
    <path class="arrow" d="M 98 78 L 98 116"/>
    <circle class="checkpoint" cx="98" cy="148" r="18"/>
    <text class="small" x="43" y="190">checkpoint theta_t</text>
  </g>
  <g transform="translate(92 368)">
    <circle cx="8" cy="8" r="5" fill="#4137ff"/>
    <text class="tiny" x="22" y="12">save every 10 steps</text>
  </g>

  <text class="label" x="480" y="150">2. Probe a local slice</text>
  <text class="small" x="480" y="174">theta_t + alpha delta + beta eta</text>
  <g transform="translate(502 212)">
    <rect x="0" y="0" width="196" height="164" rx="8" fill="#fbfcff" stroke="#d7dde8"/>
    <g>
      <line class="grid" x1="28" y1="18" x2="28" y2="146"/>
      <line class="grid" x1="56" y1="18" x2="56" y2="146"/>
      <line class="grid" x1="84" y1="18" x2="84" y2="146"/>
      <line class="grid" x1="112" y1="18" x2="112" y2="146"/>
      <line class="grid" x1="140" y1="18" x2="140" y2="146"/>
      <line class="grid" x1="168" y1="18" x2="168" y2="146"/>
      <line class="grid" x1="16" y1="38" x2="180" y2="38"/>
      <line class="grid" x1="16" y1="66" x2="180" y2="66"/>
      <line class="grid" x1="16" y1="94" x2="180" y2="94"/>
      <line class="grid" x1="16" y1="122" x2="180" y2="122"/>
    </g>
    <ellipse class="kl" cx="98" cy="82" rx="34" ry="25"/>
    <ellipse class="kl" cx="98" cy="82" rx="62" ry="46" opacity="0.5"/>
    <ellipse class="kl" cx="98" cy="82" rx="83" ry="62" opacity="0.28"/>
    <circle class="checkpoint" cx="98" cy="82" r="8"/>
    <path class="axis" d="M 20 146 L 178 146"/>
    <path class="axis" d="M 20 146 L 20 24"/>
    <text class="tiny" x="170" y="160">alpha</text>
    <text class="tiny" x="4" y="20">beta</text>
  </g>
  <text class="tiny" x="518" y="405">441 policies per checkpoint, scored by reward, KL, and surrogate loss</text>

  <text class="label" x="874" y="150">3. High reward localizes</text>
  <text class="small" x="874" y="174">reward aligns with the low-KL region</text>
  <g transform="translate(880 206)">
    <text class="tiny" x="18" y="0">early</text>
    <rect x="0" y="12" width="108" height="108" rx="8" fill="#fbfcff" stroke="#d7dde8"/>
    <ellipse class="kl" cx="54" cy="66" rx="22" ry="17"/>
    <ellipse class="kl" cx="54" cy="66" rx="42" ry="33" opacity="0.45"/>
    <circle class="checkpoint" cx="54" cy="66" r="6"/>
    <circle class="high" cx="30" cy="37" r="6"/>
    <circle class="mid" cx="78" cy="39" r="6"/>
    <circle class="high" cx="84" cy="92" r="6"/>
    <circle class="low" cx="28" cy="88" r="6"/>

    <text class="tiny" x="150" y="0">later</text>
    <rect x="132" y="12" width="108" height="108" rx="8" fill="#fbfcff" stroke="#d7dde8"/>
    <ellipse class="kl" cx="186" cy="66" rx="22" ry="17"/>
    <ellipse class="kl" cx="186" cy="66" rx="42" ry="33" opacity="0.45"/>
    <circle class="checkpoint" cx="186" cy="66" r="6"/>
    <circle class="high" cx="179" cy="61" r="6"/>
    <circle class="high" cx="193" cy="70" r="6"/>
    <circle class="mid" cx="188" cy="52" r="6"/>
    <circle class="low" cx="220" cy="98" r="6"/>
    <circle class="low" cx="151" cy="35" r="6"/>
  </g>

  <g transform="translate(882 354)">
    <rect class="callout" x="0" y="0" width="224" height="58"/>
    <text class="small" x="16" y="23">Main readout:</text>
    <text class="small" x="16" y="43">reward becomes a low-KL basin.</text>
  </g>

  <g transform="translate(60 482)">
    <rect x="0" y="0" width="1080" height="42" rx="8" fill="#ffffff" stroke="#d7dde8"/>
    <circle class="high" cx="28" cy="21" r="7"/>
    <text class="small" x="44" y="26">high reward</text>
    <circle class="mid" cx="156" cy="21" r="7"/>
    <text class="small" x="172" y="26">medium reward</text>
    <circle class="low" cx="308" cy="21" r="7"/>
    <text class="small" x="324" y="26">low reward</text>
    <path class="kl" d="M 452 21 C 468 8 492 8 508 21 C 492 34 468 34 452 21"/>
    <text class="small" x="526" y="26">KL contour around checkpoint policy</text>
    <text class="small" x="800" y="26">Claim: useful exploration is constrained to the reachable low-KL neighborhood.</text>
  </g>
</svg>
